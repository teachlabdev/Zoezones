<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoe Zones v13 (AI Learning Edition)</title>

  <style>
    :root {
      /* --- WARM PALETTE --- */
      --blue: #64b5f6;   /* Sky Blue */
      --green: #81c784;  /* Sage */
      --yellow: #fff176; /* Sunshine */
      --red: #e57373;    /* Coral */
      --purple: #ba68c8; /* Orchid */

      /* UI Colors */
      --bg-color: #fff9f0; /* Warm Cream */
      --card-color: #ffffff;
      --text-primary: #4a4a4a;
      --text-secondary: #787878;
      --border-color: #f0e6d2;
    }

    /* --- HIGH CONTRAST MODE --- */
    body.high-contrast {
      --bg-color: #000000 !important;
      --card-color: #000000 !important;
      --text-primary: #ffffff !important;
      --text-secondary: #ffff00 !important;
      --border-color: #ffffff !important;
      --blue: #00ffff !important;
      --green: #00ff00 !important;
      --yellow: #ffff00 !important;
      --red: #ff0000 !important;
      --purple: #ff00ff !important;
    }

    body.high-contrast .app-container { border: 3px solid white; box-shadow: none; }
    body.high-contrast .modal-content { background-color: #000 !important; border: 2px solid yellow !important; color: yellow !important; }
    body.high-contrast th, body.high-contrast td { border-bottom: 1px solid white !important; color: white !important; }
    body.high-contrast .zone-btn { border: 2px solid white; background: #000; }
    body.high-contrast .zone-btn.selected { background: #333; border-color: yellow; }

    /* --- GRADE LEVEL STYLES --- */
    body.grade-k2 {
      font-family: "Comic Sans MS", "Chalkboard SE", sans-serif !important;
    }
    body.grade-k2 .zone-btn { border-radius: 50% !important; }
    body.grade-k2 h1 { font-size: 2em; }
    body.grade-k2 .action-btn { border-radius: 50px; font-size: 1.6em; }

    /* --- BASE STYLES --- */
    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      transition: background-color 1s ease;
    }

    .app-container {
      max-width: 700px;
      width: 100%;
      background-color: var(--card-color);
      border-radius: 30px;
      box-shadow: 0 15px 50px rgba(100, 100, 90, 0.1);
      overflow: hidden;
      transition: background-color 0.3s ease;
      position: relative;
    }

    /* --- HEADER --- */
    header {
      padding: 25px 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      background: linear-gradient(90deg, #fffbf5, #f7f3e8);
    }

    @media (min-width: 600px) {
      header { flex-direction: row; justify-content: space-between; }
    }

    body.high-contrast header { background: #000; border-bottom: 2px solid #fff; }

    h1 { margin: 0; font-size: 1.6em; color: var(--text-primary); font-weight: 800; letter-spacing: -0.5px; }
    body.high-contrast h1 { color: #fff; }

    .access-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .icon-btn {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 1.1em;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .icon-btn.active { background-color: var(--blue); color: white; border-color: var(--blue); }
    body.high-contrast .icon-btn { border: 2px solid yellow; color: yellow; background: black; }
    body.high-contrast .icon-btn.active { background: yellow; color: black; }

    /* --- MAIN CONTENT --- */
    .main-content { padding: 40px; }
    .form-group { margin-bottom: 35px; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 15px;
      font-size: 1.3em;
      color: var(--text-primary);
    }

    select {
      width: 100%;
      padding: 16px;
      font-size: 1.1em;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      background-color: #fafafa;
      color: var(--text-primary);
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--blue); }

    /* --- ANIMATED ZONES --- */
    .zone-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
    }

    .zone-btn {
      background: white;
      border: 3px solid transparent;
      border-radius: 20px;
      cursor: pointer;
      padding: 20px 5px;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      min-height: 110px;
      justify-content: center;
    }

    .zone-btn:hover { transform: scale(1.05); box-shadow: 0 8px 15px rgba(0,0,0,0.08); }

    .zone-btn.selected {
      background-color: #fff;
      border-color: #555;
      transform: scale(1.05);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    }

    .zone-icon { width: 50px; height: 50px; margin-bottom: 5px; }

    .zone-label {
      font-size: 0.9em;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: capitalize;
    }
    body.high-contrast .zone-label { color: white; }

    /* EMOJI MODE vs SHAPE MODE */
    .emoji-icon { display: none; font-size: 3em; line-height: 1; }
    body.style-classic .zone-icon { display: none; }
    body.style-classic .emoji-icon { display: block; }

    /* --- ACTION BUTTON --- */
    .action-btn {
      width: 100%;
      padding: 20px;
      font-size: 1.4em;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #64b5f6, #ba68c8);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(100, 181, 246, 0.4);
      transition: transform 0.2s;
      margin-top: 10px;
    }
    .action-btn:hover { transform: translateY(-3px); }
    .action-btn:active { transform: scale(0.98); }

    body.high-contrast .action-btn {
      background: black;
      border: 2px solid yellow;
      color: yellow;
      box-shadow: none;
    }

    /* --- RESULTS AREA --- */
    #resultContainer {
      display: none;
      margin-top: 40px;
      background-color: #fff;
      border-radius: 20px;
      padding: 30px;
      border: 2px solid var(--border-color);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    @keyframes slideUp { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);} }

    #strategyTitle { font-size: 1.8em; margin: 15px 0; color: var(--text-primary); }
    body.high-contrast #strategyTitle { color: white; }

    #strategyDesc { font-size: 1.3em; line-height: 1.6; color: var(--text-secondary); margin-bottom: 20px; }
    body.high-contrast #strategyDesc { color: yellow; }

    /* Feedback Buttons */
    .feedback-row {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
    }
    .feed-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .feed-btn:hover { transform: scale(1.05); }

    .btn-yes { background-color: #c8e6c9; color: #2e7d32; }
    .btn-no { background-color: #ffcdd2; color: #c62828; }

    body.high-contrast .btn-yes { background: black; border: 2px solid white; color: white; }
    body.high-contrast .btn-no { background: black; border: 2px solid white; color: white; text-decoration: line-through; }

    /* Joke Box */
    #jokeBox {
      margin-top: 20px;
      padding: 15px;
      background-color: #fffde7;
      border-radius: 12px;
      border: 1px solid #fff9c4;
      display: none;
      font-style: italic;
      color: #f57f17;
      font-size: 1.1em;
    }

    /* --- SCIENTIFIC BACKGROUND CLASSES --- */
    body.bg-cooling { background-color: #e3f2fd; }
    body.bg-warming { background-color: #fff3e0; }
    body.bg-grounding { background-color: #f1f8e9; }
    body.bg-fresh { background-color: #fff8e1; }
    body.bg-calm { background-color: #f3e5f5; }

    /* --- STATS MODAL --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      animation: fadeIn 0.3s ease;
    }

    .modal-content {
      background-color: var(--card-color);
      color: var(--text-primary);
      margin: 10% auto;
      padding: 40px;
      border-radius: 24px;
      width: 85%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      animation: slideUp 0.4s ease-out;
    }

    .modal-header h2 { margin-top: 0; color: var(--blue); }
    .modal-close { float: right; font-size: 2em; cursor: pointer; color: #ccc; }
    .modal-close:hover { color: var(--red); }

    #statsContent table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    #statsContent th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; color: #999; }
    #statsContent td { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 1.1em; }

    /* GRADE PICKER STYLES */
    .grade-picker {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: white;
      color: var(--text-primary);
      font-size: 1em;
      cursor: pointer;
    }
/* THERAPEUTIC COLOR THERAPY - Applied to result container only for privacy */

  border-color: #aed581;
}

  background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
  border-color: #ffd54f;
}

  background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
  border-color: #ce93d8;
}

body.high-contrast #resultContainer.therapy-cooling,
body.high-contrast #resultContainer.therapy-warming,
body.high-contrast #resultContainer.therapy-grounding,
body.high-contrast #resultContainer.therapy-fresh,
body.high-contrast #resultContainer.therapy-calm {
  background: #000 !important;
  border: 2px solid yellow !important;
}

      opacity: 0.45;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <header>
      <div style="display:flex; align-items:center; gap:10px;">
        <h1 id="appTitle">Zoe Zones</h1>
        <select id="gradeSelect" class="grade-picker">
          <option value="3-5">Gr. 3-5</option>
          <option value="K-2">Gr. K-2</option>
        </select>
      </div>

      <div class="access-controls">
        <!-- Language Buttons -->
        <button class="icon-btn active" id="langEn" title="English">🇺🇸</button>
        <button class="icon-btn" id="langEs" title="Español">🇪🇸</button>
        <button class="icon-btn" id="langTw" title="Twi (Ghana)">🇬🇭</button>
        <button class="icon-btn" id="langJp" title="日本語">🇯🇵</button>

        <!-- Tools -->
        <button class="icon-btn" id="styleBtn" title="Visual Style (Shapes/Emojis)">🎨</button>
        <button class="icon-btn" id="speechBtn" title="Voice (Mute/Unmute)">🔇</button>
        <button class="icon-btn" id="musicBtn" title="Calm Audio">🎵</button>
        <button class="icon-btn" id="contrastBtn" title="High Contrast">👁️</button>
        <button class="icon-btn" id="statsBtn" title="Stats">📊</button>
      </div>
    </header>

    <div class="main-content">
      <!-- 1. Student Number -->
      <div class="form-group">
        <label id="lblWho">1. Select your Student Number</label>
        <select id="studentSelect"></select>
      </div>

      <!-- 2. Zone Selection -->
      <div class="form-group" id="zoneSection">
        <label id="lblFeel">2. What Zone are you in?</label>
        <div class="zone-grid">
          <!-- Green -->
          <button class="zone-btn" data-zone="green" type="button">
            <span class="emoji-icon">🟢</span>
            <svg class="zone-icon" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="#81c784"></circle>
              <path d="M30 50 L45 65 L70 35" stroke="white" stroke-width="8" fill="none"></path>
            </svg>
            <span class="zone-label" id="lblGreen">Green</span>
          </button>

          <!-- Yellow -->
          <button class="zone-btn" data-zone="yellow" type="button">
            <span class="emoji-icon">🟡</span>
            <svg class="zone-icon" viewBox="0 0 100 100">
              <path d="M50 10 L90 80 L10 80 Z" fill="#fff176"></path>
              <rect x="45" y="30" width="10" height="30" fill="#f9a825"></rect>
              <circle cx="50" cy="70" r="5" fill="#f9a825"></circle>
            </svg>
            <span class="zone-label" id="lblYellow">Yellow</span>
          </button>

          <!-- Purple -->
          <button class="zone-btn" data-zone="purple" type="button">
            <span class="emoji-icon">🟣</span>
            <svg class="zone-icon" viewBox="0 0 100 100">
              <polygon points="50,10 61,35 88,35 66,50 75,75 50,60 25,75 34,50 12,35 39,35" fill="#ba68c8"></polygon>
              <text x="50" y="65" font-size="40" text-anchor="middle" fill="white">!</text>
            </svg>
            <span class="zone-label" id="lblPurple">Purple</span>
          </button>

          <!-- Blue -->
          <button class="zone-btn" data-zone="blue" type="button">
            <span class="emoji-icon">🔵</span>
            <svg class="zone-icon" viewBox="0 0 100 100">
              <path d="M25,60 Q20,40 40,40 Q50,20 70,40 Q90,40 85,60 Z" fill="#64b5f6"></path>
            </svg>
            <span class="zone-label" id="lblBlue">Blue</span>
          </button>

          <!-- Red -->
          <button class="zone-btn" data-zone="red" type="button">
            <span class="emoji-icon">🔴</span>
            <svg class="zone-icon" viewBox="0 0 100 100">
              <rect x="15" y="15" width="70" height="70" rx="10" fill="#e57373"></rect>
              <rect x="25" y="40" width="50" height="20" fill="white"></rect>
            </svg>
            <span class="zone-label" id="lblRed">Red</span>
          </button>
        </div>
      </div>

      <!-- 3. Class Selection -->
      <div class="form-group" id="classSection">
        <label id="lblClass">3. What is next?</label>
        <select id="periodSelect"></select>
      </div>

      <button class="action-btn" id="goBtn" type="button">✨ Ask Zoe</button>

      <!-- RESULT AREA -->

        <div id="jokeBox">
          <span id="jokeText"></span>
        </div>

        <h2 id="strategyTitle">Strategy Name</h2>
        <p id="strategyDesc">Description goes here.</p>
        <small id="aiStats" style="color:#bbb;">(AI Confidence: 0%)</small>

        <div class="feedback-row">
          <button class="feed-btn btn-yes" id="yesBtn" type="button">👍 It helped</button>
          <button class="feed-btn btn-no" id="noBtn" type="button">👎 Try another</button>
        </div>
      </div>
    </div>
  </div>

        <span class="modal-close">&times;</span>

      function lockOrUnlockZones() {

      function getSuccessScore(strategyId) {
        let memory = JSON.parse(localStorage.getItem('zoeData')) || [];
        let strategyData = memory.filter(m => m.id === strategyId);

        if (strategyData.length === 0) return 50;

        let successes = strategyData.filter(m => m.outcome === 'success').length;
        let total = strategyData.length;
        let successRate = (successes / total) * 100;

        let recentBonus = 0;
        let recentData = strategyData.slice(-5);
        if (recentData.length > 0) {
          let recentSuccesses = recentData.filter(m => m.outcome === 'success').length;
          recentBonus = (recentSuccesses / recentData.length) * 10;
        }

        return successRate + recentBonus;
      }

      function generateRecommendation() {
        if (!studentSelect.value) return;

        const period = periodSelect.value;
        let category = (period === 'specials') ? 'specials' : 'academic';

        let pool =
          (strategies[selectedZone] && strategies[selectedZone][category]) ||
          (strategies[selectedZone] && strategies[selectedZone].default) ||
          strategies.default ||
          [];

        // Force green/purple to use default arrays (as you intended)
        if (selectedZone === 'green') pool = strategies.green.default;
        if (selectedZone === 'purple') pool = strategies.purple.default;

        // Filter out rejected strategies this session
        let available = pool.filter(s => !excludedStrategies.includes(s.id));
        if (available.length === 0) available = pool;

        // Sort by success score (highest first)
        available.sort((a, b) => getSuccessScore(b.id) - getSuccessScore(a.id));

        currentStrategy = available[0] || null;
        if (!currentStrategy) return;

        const confidence = Math.round(getSuccessScore(currentStrategy.id));

      // --- AUDIO ENGINE (Brown Noise) ---
      function toggleMusic() {
        if (isPlaying) {
          if (audioContext) audioContext.suspend();
          isPlaying = false;
          musicBtn.classList.remove('active');
          return;
        }

        if (!audioContext) {
          try {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContextClass();

            const bufferSize = audioContext.sampleRate * 2;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);

            let lastOut = 0;
            for (let i = 0; i < bufferSize; i++) {
              const white = Math.random() * 2 - 1;
              const brown = (lastOut + (0.02 * white)) / 1.02;
              data[i] = brown * 3.5;
              lastOut = brown;
            }

            noiseSrc = audioContext.createBufferSource();
            noiseSrc.buffer = buffer;
            noiseSrc.loop = true;

            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.20;

            const lowPass = audioContext.createBiquadFilter();
            lowPass.type = 'lowpass';
            lowPass.frequency.value = 350;

            noiseSrc.connect(lowPass);
            lowPass.connect(gainNode);
            gainNode.connect(audioContext.destination);

            noiseSrc.start();
          } catch (e) {
            console.log("Audio issue: " + e);
          }
        }

        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }

        isPlaying = true;
        musicBtn.classList.add('active');
      }

      // --- SPEECH SYNTHESIS ENGINE ---
      function toggleSpeech() {
        isSpeechEnabled = !isSpeechEnabled;
        if (isSpeechEnabled) {
          speechBtn.textContent = "🔊";
          speechBtn.classList.add('active');
          speakText(i18n[currentLang].btnAsk);
        } else {
          speechBtn.textContent = "🔇";
          speechBtn.classList.remove('active');
          window.speechSynthesis.cancel();
        }
      }

      function speakText(text) {
        if (!isSpeechEnabled) return;

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        if (currentLang === 'en') utterance.lang = 'en-US';
        if (currentLang === 'es') utterance.lang = 'es-ES';
        if (currentLang === 'jp') utterance.lang = 'ja-JP';
        // Note: Twi voices vary; leaving as default avoids hard failure.

        const voices = window.speechSynthesis.getVoices();
        // Less brittle: prefer matching language first; don’t rely on “Female” in the name.
        const preferredVoice = voices.find(v => v.lang && utterance.lang && v.lang.startsWith(utterance.lang.slice(0,2)));
        if (preferredVoice) utterance.voice = preferredVoice;

        window.speechSynthesis.speak(utterance);
      }

      function showStats() {
        let memory = JSON.parse(localStorage.getItem('zoeData')) || [];
        let stats = {};
        memory.forEach(item => {
          if (!stats[item.id]) stats[item.id] = { total: 0, success: 0 };
          stats[item.id].total++;
          if (item.outcome === 'success') stats[item.id].success++;
        });

        let html = "<table><tr><th>Strategy</th><th>Success Rate</th><th>Total Uses</th></tr>";
        if (Object.keys(stats).length === 0) {
          html += "<tr><td colspan='3'>No data yet. Zoe is ready to learn!</td></tr>";
        } else {
          let sorted = Object.entries(stats).sort((a, b) => {
            const rateA = (a[1].success / a[1].total);
            const rateB = (b[1].success / b[1].total);
            return rateB - rateA;
          });

          sorted.forEach(([id, data]) => {
            let rate = Math.round((data.success / data.total) * 100);
            html += `<tr><td>${id}</td><td>${rate}%</td><td>${data.total}</td></tr>`;
          });
        }
        html += "</table>";
        statsContent.innerHTML = html;
        statsModal.style.display = "block";
      }
