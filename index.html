<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoe Zones Check-In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>How are you feeling?</h1>
            <p class="subtitle">Choose your zone</p>
        </header>

        <!-- Zone Selection -->
        <div id="zone-selection" class="zone-grid">
            <button class="zone-btn blue-zone" data-zone="blue">
                <span class="zone-emoji">😔</span>
                <span class="zone-name">Blue Zone</span>
                <span class="zone-desc">Sad, tired, bored</span>
            </button>
            
            <button class="zone-btn green-zone" data-zone="green">
                <span class="zone-emoji">😊</span>
                <span class="zone-name">Green Zone</span>
                <span class="zone-desc">Ready to learn</span>
            </button>
            
            <button class="zone-btn yellow-zone" data-zone="yellow">
                <span class="zone-emoji">😬</span>
                <span class="zone-name">Yellow Zone</span>
                <span class="zone-desc">Excited, worried, silly</span>
            </button>
            
            <button class="zone-btn red-zone" data-zone="red">
                <span class="zone-emoji">😠</span>
                <span class="zone-name">Red Zone</span>
                <span class="zone-desc">Mad, frustrated, scared</span>
            </button>
        </div>

        <!-- Strategy Display (hidden initially) -->
        <div id="strategy-display" class="strategy-container hidden">
            <h2>Here's a strategy that might help</h2>
            
            <div class="strategy-card">
                <h3 id="strategy-title"></h3>
                <p id="strategy-description"></p>
                <div id="strategy-steps"></div>
            </div>

            <div class="action-buttons">
                <button id="try-strategy" class="btn-primary">I'll try this!</button>
                <button id="different-strategy" class="btn-secondary">Show me something else</button>
            </div>

            <button id="finish-checkin" class="btn-done">All done ✓</button>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="hidden">
            <div class="success-card">
                <span class="success-emoji">⭐</span>
                <h2>Great job checking in!</h2>
                <p>Remember, all feelings are okay.</p>
                <button id="new-checkin" class="btn-primary">Start New Check-In</button>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script src="brain.js"></script>
    <script src="app.js"></script>
</body>
</html>
